name: Auto Update AUR Package

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-aur:
    runs-on: ubuntu-latest
    env:
      API_URL: 'https://api.github.com/repos/open-ani/animeko/releases?per_page=100'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest beta release and asset
        id: get_release
        run: |
          releases=$(curl -sS -H 'Accept: application/vnd.github+json' "$API_URL")
          tag=$(echo "$releases" | jq -r '[.[] | select(.prerelease == true and (.tag_name|test("beta";"i")))] | .[0].tag_name // ""')
          [ -z "$tag" ] && tag=$(echo "$releases" | jq -r '[.[] | select(.tag_name|test("beta";"i"))] | .[0].tag_name // ""')
          [ -n "$tag" ] || { echo 'no beta tag'; exit 1; }
          url=$(curl -sS -H 'Accept: application/vnd.github+json' "https://api.github.com/repos/open-ani/animeko/releases/tags/$tag" | jq -r '.assets[] | select(.name|test("linux.*x86_64\\.appimage";"i")) | .browser_download_url' | head -n1)
          [ -n "$url" ] || { echo 'no asset url'; exit 1; }
          echo "latest_tag=$tag" >> $GITHUB_ENV
          echo "latest_asset_url=$url" >> $GITHUB_ENV

      - name: Current pkgver
        id: get_pkgver
        run: |
          current=$(grep -E '^pkgver=' PKGBUILD | head -n1 | sed -E 's/^pkgver=//; s/^"//; s/"$//; s/^\x27//; s/\x27$//')
          [ -n "$current" ] || { echo 'cannot parse pkgver'; exit 1; }
          echo "current_pkgver=$current" >> $GITHUB_ENV

      - name: Check update
        id: check_update
        run: |
          latest=${latest_tag#v}
          current=$current_pkgver
          echo "latest=$latest current=$current"
          if [ "$latest" = "$current" ]; then
            echo 'update_needed=false' >> $GITHUB_ENV
            echo 'update_needed=false' >> $GITHUB_OUTPUT
          else
            echo 'update_needed=true' >> $GITHUB_ENV
            echo 'update_needed=true' >> $GITHUB_OUTPUT
          fi

      - name: Apply update
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          latest=${latest_tag#v}
          url=$latest_asset_url
          curl -I -fS "$url" > /dev/null
          curl -fSL -o ani.appimage "$url"
          sha=$(sha512sum ani.appimage | awk '{print $1}')
          sed -i -E "s/^pkgver=.*/pkgver=\"$latest\"/" PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i -E "s|^source_x86_64=.*|source_x86_64=(\"$url\")|" PKGBUILD
          sed -i -E "s|^sha512sums_x86_64=.*|sha512sums_x86_64=('$sha')|" PKGBUILD
          sed -i -E "s/^pkgver = .*/pkgver = $latest/" .SRCINFO
          sed -i -E "s/^pkgrel = .*/pkgrel = 1/" .SRCINFO
          sed -i -E "s|^source_x86_64 = .*|source_x86_64 = $url|" .SRCINFO
          sed -i -E "s|^sha512sums_x86_64 = .*|sha512sums_x86_64 = $sha|" .SRCINFO

      - name: Commit and push
        if: steps.check_update.outputs.update_needed == 'true'
        run: |
          git config user.name 'PaloMiku'
          git config user.email 'palomiku@outlook.com'
          git add PKGBUILD .SRCINFO
          if ! git diff --cached --quiet; then
            git commit -m "Update PKGBUILD to $latest_tag"
            git push origin HEAD:${{ github.ref }}
          fi

      - name: Publish AUR
        if: steps.check_update.outputs.update_needed == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: animeko-appimage-beta
          pkgbuild: ./PKGBUILD
          commit_username: 'PaloMiku'
          commit_email: 'palomiku@outlook.com'
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to $latest_tag"
          ssh_keyscan_types: rsa,ecdsa,ed25519
